services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ranklens
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ranklens"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: worker
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ranklens?schema=public
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ranklens?schema=public
      REPORT_STORAGE_DIR: /app/storage/reports
    volumes:
      - reports:/app/storage/reports
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ranklens?schema=public
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
  reports:
